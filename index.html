```html id="mcv3oc"
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga Character Planner</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div>
    <h1>MANGA CHARACTER PLANNER</h1>
    <p>Create and manage your manga cast</p>
  </div>

  <button onclick="openModal()">
    + Add Character
  </button>
</header>

<div class="container">

  <input
    type="text"
    id="search"
    placeholder="Search characters..."
    oninput="renderCharacters()"
  >

  <div id="characterGrid" class="grid"></div>

</div>

<!-- ADD CHARACTER MODAL -->

<div class="modal" id="modal">

  <div class="modal-content">

    <span class="close" onclick="closeModal()">✖</span>

    <h2>Add Character</h2>

    <label>Name</label>
    <input id="name">

    <label>Age</label>
    <input type="number" id="age">

    <label>Role</label>
    <input id="role">

    <label>Power Type</label>
    <input id="powerType">

    <label>Image URL</label>
    <input id="image">

    <h2 class="section-title">Stats</h2>

    <label>
      Strength:
      <span id="strengthValue">5</span>/10
    </label>

    <input
      type="range"
      min="0"
      max="10"
      value="5"
      id="strength"
      oninput="updateSlider('strength')"
    >

    <label>
      Speed:
      <span id="speedValue">5</span>/10
    </label>

    <input
      type="range"
      min="0"
      max="10"
      value="5"
      id="speed"
      oninput="updateSlider('speed')"
    >

    <label>
      Intelligence:
      <span id="intelligenceValue">5</span>/10
    </label>

    <input
      type="range"
      min="0"
      max="10"
      value="5"
      id="intelligence"
      oninput="updateSlider('intelligence')"
    >

    <label>
      Magic:
      <span id="magicValue">5</span>/10
    </label>

    <input
      type="range"
      min="0"
      max="10"
      value="5"
      id="magic"
      oninput="updateSlider('magic')"
    >

    <label>
      Stamina:
      <span id="staminaValue">5</span>/10
    </label>

    <input
      type="range"
      min="0"
      max="10"
      value="5"
      id="stamina"
      oninput="updateSlider('stamina')"
    >

    <h2 class="section-title">Details</h2>

    <label>Appearance</label>
    <textarea id="appearance"></textarea>

    <label>Personality</label>
    <textarea id="personality"></textarea>

    <label>Backstory</label>
    <textarea id="backstory"></textarea>

    <label>Powers / Abilities</label>
    <textarea id="powers"></textarea>

    <label>Relationships</label>
    <textarea id="relationships"></textarea>

    <button onclick="saveCharacter()">
      Save Character
    </button>

  </div>

</div>

<!-- CHARACTER PROFILE -->

<div class="modal" id="profileModal">

  <div class="modal-content" id="profileContent"></div>

</div>

<script src="script.js"></script>

</body>
</html>
```
