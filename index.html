```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Manga Character Planner</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d0d12;
    color:white;
}

header{
    padding:20px;
    border-bottom:2px solid crimson;
    background:#111;
}

h1{
    margin:0;
    color:crimson;
    font-size:40px;
}

.container{
    padding:20px;
}

button{
    background:crimson;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:15px;
    border-radius:8px;
    border:none;
    background:#1b1b24;
    color:white;
}

textarea{
    min-height:100px;
    resize:vertical;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:#16161f;
    border:1px solid crimson;
    border-radius:16px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card-content{
    padding:18px;
}

.card h2{
    margin-top:0;
    color:crimson;
}

.stat{
    margin-bottom:12px;
}

.bar{
    height:12px;
    background:#333;
    border-radius:20px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:crimson;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:auto;
}

.modal-content{
    background:#14141c;
    width:100%;
    max-width:700px;
    padding:25px;
    border-radius:20px;
    border:2px solid crimson;
}

.close{
    float:right;
    cursor:pointer;
    font-size:24px;
}

label{
    font-weight:bold;
}

.section-title{
    margin-top:25px;
    color:crimson;
    font-size:24px;
}

.relationship{
    background:#1d1d28;
    padding:8px;
    border-radius:8px;
    margin-bottom:8px;
}
</style>
</head>

<body>

<header>
<h1>MANGA CHARACTER PLANNER</h1>
<p>Create and manage your manga cast</p>

<br>

<button onclick="openModal()">
+ Add Character
</button>
</header>

<div class="container">

<div id="characterGrid" class="grid"></div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<h2>Add Character</h2>

<label>Name</label>
<input id="name">

<label>Age</label>
<input id="age" type="number">

<label>Role</label>
<input id="role">

<label>Appearance</label>
<textarea id="appearance"></textarea>

<label>Personality</label>
<textarea id="personality"></textarea>

<label>Backstory</label>
<textarea id="backstory"></textarea>

<label>Powers / Abilities</label>
<textarea id="powers"></textarea>

<label>Relationships</label>
<textarea id="relationships" placeholder="Example:
Ren - Rival
Mika - Sister"></textarea>

<label>Image URL</label>
<input id="image">

<h2 class="section-title">Stats (Out of 10)</h2>

<label>Strength</label>
<input type="range" min="0" max="10" value="5" id="strength">

<label>Speed</label>
<input type="range" min="0" max="10" value="5" id="speed">

<label>Intelligence</label>
<input type="range" min="0" max="10" value="5" id="intelligence">

<label>Magic</label>
<input type="range" min="0" max="10" value="5" id="magic">

<label>Stamina</label>
<input type="range" min="0" max="10" value="5" id="stamina">

<br><br>

<button onclick="saveCharacter()">
Save Character
</button>

</div>
</div>

<script>
let characters = JSON.parse(localStorage.getItem("mangaCharacters")) || [];

function openModal(){
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

function saveCharacter(){

    const character = {
        id: Date.now(),

        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        role: document.getElementById("role").value,
        appearance: document.getElementById("appearance").value,
        personality: document.getElementById("personality").value,
        backstory: document.getElementById("backstory").value,
        powers: document.getElementById("powers").value,
        relationships: document.getElementById("relationships").value,
        image: document.getElementById("image").value,

        stats:{
            strength: document.getElementById("strength").value,
            speed: document.getElementById("speed").value,
            intelligence: document.getElementById("intelligence").value,
            magic: document.getElementById("magic").value,
            stamina: document.getElementById("stamina").value
        }
    };

    characters.push(character);

    localStorage.setItem(
        "mangaCharacters",
        JSON.stringify(characters)
    );

    renderCharacters();

    closeModal();
}

function createStat(name, value){

    return `
    <div class="stat">

        <div>
            ${name}: ${value}/10
        </div>

        <div class="bar">
            <div class="fill"
            style="width:${value * 10}%"></div>
        </div>

    </div>
    `;
}

function renderCharacters(){

    const grid = document.getElementById("characterGrid");

    grid.innerHTML = "";

    characters.forEach(character => {

        grid.innerHTML += `
        <div class="card">

            ${
                character.image
                ?
                `<img src="${character.image}">`
                :
                ""
            }

            <div class="card-content">

                <h2>${character.name}</h2>

                <p><b>Age:</b> ${character.age}</p>
                <p><b>Role:</b> ${character.role}</p>

                <h3>Appearance</h3>
                <p>${character.appearance}</p>

                <h3>Personality</h3>
                <p>${character.personality}</p>

                <h3>Backstory</h3>
                <p>${character.backstory}</p>

                <h3>Powers</h3>
                <p>${character.powers}</p>

                <h3>Relationships</h3>

                <div class="relationship">
                    ${character.relationships.replaceAll("\n","<br>")}
                </div>

                <h3>Stats</h3>

                ${createStat("Strength", character.stats.strength)}
                ${createStat("Speed", character.stats.speed)}
                ${createStat("Intelligence", character.stats.intelligence)}
                ${createStat("Magic", character.stats.magic)}
                ${createStat("Stamina", character.stats.stamina)}

            </div>

        </div>
        `;
    });
}

renderCharacters();
</script>

</body>
</html>
```
